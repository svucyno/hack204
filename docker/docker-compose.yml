services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../Backend
      dockerfile: Dockerfile
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: learning
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-prod-use-openssl-rand-hex-32
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1:5173
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  mongodata:
